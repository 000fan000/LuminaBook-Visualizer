
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f5f7">
  <title>LuminaBook Reader</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;500;700&family=Noto+Sans+SC:wght@300;500;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      overflow-x: hidden;
    }
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Chinese Fonts */
    .font-zh-serif { font-family: 'Noto Serif SC', serif; }
    .font-zh-sans { font-family: 'Noto Sans SC', sans-serif; }
    .font-zh-brush { font-family: 'Ma Shan Zheng', cursive; }
    .font-zh-ink { font-family: 'Zhi Mang Xing', cursive; }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #c4c4c6;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a1a1a6;
    }

    /* Vertical Writing Utilities */
    .writing-v-rl { writing-mode: vertical-rl; }
    .writing-v-lr { writing-mode: vertical-lr; }
    .writing-h-tb { writing-mode: horizontal-tb; }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .pdf-text-layer {
      color-scheme: only light;
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 1;
      line-height: 1;
      letter-spacing: normal;
      word-spacing: normal;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
      forced-color-adjust: none;
      transform-origin: 0 0;
      z-index: 1;
      --total-scale-factor: 1;
      --scale-round-x: 1px;
      --scale-round-y: 1px;
      --min-font-size: 1;
      --text-scale-factor: calc(var(--total-scale-factor) * var(--min-font-size));
      --min-font-size-inv: calc(1 / var(--min-font-size));
    }

    .pdf-text-layer span,
    .pdf-text-layer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      -webkit-user-select: text;
      user-select: text;
    }

    .pdf-text-layer > :not(.markedContent),
    .pdf-text-layer .markedContent span:not(.markedContent) {
      z-index: 1;
      --font-height: 0;
      font-size: calc(var(--text-scale-factor) * var(--font-height));
      --scale-x: 1;
      --rotate: 0deg;
      transform: rotate(var(--rotate)) scaleX(var(--scale-x)) scale(var(--min-font-size-inv));
    }

    .pdf-text-layer .markedContent {
      display: contents;
    }

    .pdf-text-layer span[role="img"] {
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }

    .pdf-text-layer ::selection {
      background: rgba(59, 130, 246, 0.32);
      color: transparent;
    }

    .pdf-text-layer .pdf-external-highlight {
      text-decoration-color: #6e6e73;
      text-decoration-thickness: 2px;
    }

    .pdf-text-layer .pdf-annotation-anchor {
      pointer-events: auto;
      cursor: help;
      color: transparent;
      background: transparent;
      text-decoration-line: underline;
      text-decoration-color: #8e8e93;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
    }

    .pdf-text-layer .pdf-annotation-anchor:hover,
    .pdf-text-layer .pdf-annotation-anchor:focus {
      background: transparent;
      text-decoration-color: #6e6e73;
      text-decoration-thickness: 2px;
      outline: none;
    }

    .pdf-text-layer .pdf-reader-mark {
      color: transparent;
      border-radius: 2px;
    }

    .pdf-text-layer .pdf-reader-mark-highlight {
      background: rgb(253 224 71 / 0.52);
    }

    .pdf-text-layer .pdf-reader-mark-knowledge {
      background: rgb(10 132 255 / 0.22);
    }

    .pdf-soft-crop-frame {
      overflow: hidden;
      box-shadow: 0 1px 2px rgb(0 0 0 / 0.06);
    }

    .pdf-soft-crop-frame::before,
    .pdf-soft-crop-frame::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 20px;
      z-index: 2;
      pointer-events: none;
    }

    .pdf-soft-crop-frame::before {
      left: 0;
      background: linear-gradient(90deg, #f9fafb 0%, rgb(249 250 251 / 0) 100%);
    }

    .pdf-soft-crop-frame::after {
      right: 0;
      background: linear-gradient(270deg, #f9fafb 0%, rgb(249 250 251 / 0) 100%);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuminaBook Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;500;700&family=Noto+Sans+SC:wght@300;500;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f7f3ea;
      color: #1c1917;
      overflow-x: hidden;
    }
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Chinese Fonts */
    .font-zh-serif { font-family: 'Noto Serif SC', serif; }
    .font-zh-sans { font-family: 'Noto Sans SC', sans-serif; }
    .font-zh-brush { font-family: 'Ma Shan Zheng', cursive; }
    .font-zh-ink { font-family: 'Zhi Mang Xing', cursive; }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #121212;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    /* Vertical Writing Utilities */
    .writing-v-rl { writing-mode: vertical-rl; }
    .writing-v-lr { writing-mode: vertical-lr; }
    .writing-h-tb { writing-mode: horizontal-tb; }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .pdf-text-layer {
      color-scheme: only light;
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 1;
      line-height: 1;
      letter-spacing: normal;
      word-spacing: normal;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
      forced-color-adjust: none;
      transform-origin: 0 0;
      z-index: 1;
      --total-scale-factor: 1;
      --scale-round-x: 1px;
      --scale-round-y: 1px;
      --min-font-size: 1;
      --text-scale-factor: calc(var(--total-scale-factor) * var(--min-font-size));
      --min-font-size-inv: calc(1 / var(--min-font-size));
    }

    .pdf-text-layer span,
    .pdf-text-layer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      -webkit-user-select: text;
      user-select: text;
    }

    .pdf-text-layer > :not(.markedContent),
    .pdf-text-layer .markedContent span:not(.markedContent) {
      z-index: 1;
      --font-height: 0;
      font-size: calc(var(--text-scale-factor) * var(--font-height));
      --scale-x: 1;
      --rotate: 0deg;
      transform: rotate(var(--rotate)) scaleX(var(--scale-x)) scale(var(--min-font-size-inv));
    }

    .pdf-text-layer .markedContent {
      display: contents;
    }

    .pdf-text-layer span[role="img"] {
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }

    .pdf-text-layer ::selection {
      background: rgba(59, 130, 246, 0.32);
      color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
